<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/styleguide/styleguide.css">
  <link rel="stylesheet" href="/assets/css/style.css">

  <link rel="stylesheet" href="/assets/css/sections/contact.css">
  <link rel="stylesheet" href="/assets/css/sections/contact-responsive.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <script src="/assets/js/navigation.js" defer></script>
  <script src="/assets/js/auth.js" defer></script>


  <title>Vite & Gourmand</title>
</head>

<body class="page-contact">
  
   <header class="header">
        <nav class="header__nav">
            <div class="titre-connexion">
            <h1 class="vite-gourmand">
                Vite &amp; Gourmand
            </h1>

            <div class="header-actions">
                <button class="bouton-panier" id="cartButton" type="button" data-nav="profilClient" style="display: none;">
                    <img src="/assets/cart2.svg" alt="Panier" class="cart2 ">
                    <span>Aller au panier</span>
                </button>

                <button class="bouton-mon-compte d-flex align-items-center" data-nav="connexion">
                <img src="/assets/person-circle.svg" alt="Utilisateur" class="user me-2">
                <span>Mon compte/s’inscrire</span>
                </button>
            </div>

            <div class="nav__mobile-menu">
                <img src="/assets/menu-burger.svg" alt="menu-burger">
            </div>
            </div>

            <div class="liens-navigation">
            <div class="div-wrapper">
                <div class="div" data-nav="accueil">Accueil</div>
            </div>

            <div class="div-wrapper">
                <div class="div" data-nav="menus">Menu</div>
            </div>

            <div class="div-wrapper">
                <div class="div" data-nav="contact">Contact</div>
            </div>
            </div>
        </nav>
    </header>

  <main class="page-main">
    <section class="contact-section">
      <h2>Nous contacter</h2>

      <form class="contact-form">
        <input type="email" placeholder="Veuillez saisir votre email">
        <input type="text" placeholder="Objet">
        <textarea placeholder="Saisir votre demande"></textarea>
        <button type="submit" class="contact-form__button">Envoyer</button>
      </form>
    </section>

    <section class="shared-highlights">
      <div class="shared-highlights__image">
        <img src="/assets/images/chapeau-cuisine.jpg" alt="Équipe qualifiée">
      </div>

      <div class="shared-highlights__image">
        <img src="/assets/images/produits-locaux.jpg" alt="Produits frais et locaux">
      </div>

      <div class="shared-highlights__image">
        <img src="/assets/images/logo-faitmaison.jpg" alt="Fait maison">
      </div>
    </section>
  </main>

  <footer class="footer">

        <div class="footer-container">

            <!-- Infos entreprise -->
            <div class="footer-block">
            <h3>Infos entreprise</h3>
            <p>
                Vite & Gourmand,<br>
                Julie & José, 33 000 Bordeaux
            </p>
           
            </div>

            <!-- Navigation -->
            <div class="footer-block">
            <h3>Navigation</h3>
            <ul>
                <li data-nav="accueil">Accueil</li>
                <li data-nav="menus">Menus</li>
                <li data-nav="contact">Contact</li>
                <li data-nav="connexion">Connexion</li>
            </ul>
            </div>

            <!-- Horaires -->
            <div class="footer-block">
            <h3>Horaires</h3>
            <p>Lundi - Dimanche : 9h - 19h</p>
            <p>☎ 05 56 87 42 13</p>
            </div>

        </div>
        <small class="footer-legal">
            Mentions légales | CGV | © 2026 Vite & Gourmand
        </small>

    </footer>
</body>
</html>
